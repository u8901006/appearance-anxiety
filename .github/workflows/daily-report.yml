name: Appearance Anxiety Daily Report

on:
  schedule:
    - cron: "55 9 * * *"  # UTC 09:55 = GMT+8 17:55
  workflow_dispatch:
    inputs:
      date:
        description: "Target date (YYYY-MM-DD), leave empty for today"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: "24"

      - name: Determine date
        id: date
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            echo "target=${{ github.event.inputs.date }}" >> "$GITHUB_OUTPUT"
          else
            TARGET=$(TZ=Asia/Taipei date +%Y-%m-%d)
            echo "target=$TARGET" >> "$GITHUB_OUTPUT"
          fi
          echo "Date: $(grep target "$GITHUB_OUTPUT" | cut -d= -f2)"

      - name: Check for existing report
        id: check
        run: |
          FILE="docs/appearance-anxiety-${{ steps.date.outputs.target }}.html"
          if [ -f "$FILE" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Report already exists: $FILE"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No existing report, will generate new one"
          fi

      - name: Check for unsaved papers in past 7 days
        id: unsaved
        if: steps.check.outputs.exists == 'false'
        run: |
          UNSAVED="no"
          END_DATE="${{ steps.date.outputs.target }}"
          for i in $(seq 0 6); do
            D=$(TZ=Asia/Taipei date -d "$END_DATE - ${i} days" +%Y-%m-%d)
            FILE="docs/appearance-anxiety-${D}.html"
            if [ ! -f "$FILE" ]; then
              UNSAVED="yes"
              echo "Missing report for: $D"
            fi
          done
          echo "has_unsaved=$UNSAVED" >> "$GITHUB_OUTPUT"

      - name: Fetch papers from PubMed
        if: steps.check.outputs.exists == 'false'
        run: |
          node scripts/fetch_papers.js \
            --days 7 \
            --max-papers 40 \
            --output papers.json
        continue-on-error: true

      - name: Check papers data
        id: papers
        if: steps.check.outputs.exists == 'false'
        run: |
          if [ -f papers.json ] && grep -q '"count"' papers.json; then
            COUNT=$(node -e "const d=require('./papers.json'); console.log(d.count || 0)")
            echo "count=$COUNT" >> "$GITHUB_OUTPUT"
            echo "Papers found: $COUNT"
          else
            echo "count=0" >> "$GITHUB_OUTPUT"
            node -e "process.stdout.write(JSON.stringify({date:'${{ steps.date.outputs.target }}',count:0,papers:[]}))" > papers.json
            echo "No papers found, will generate empty report"
          fi

      - name: Generate report with Zhipu AI
        if: steps.check.outputs.exists == 'false'
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
        run: |
          node scripts/generate_report.js \
            --input papers.json \
            --output docs/appearance-anxiety-${{ steps.date.outputs.target }}.html \
            --api-key "$ZHIPU_API_KEY"
        timeout-minutes: 15

      - name: Generate index page
        if: steps.check.outputs.exists == 'false'
        run: node scripts/generate_index.js

      - name: Commit and push
        if: steps.check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "📋 appearance anxiety daily report: ${{ steps.date.outputs.target }}"
          git pull --rebase origin main
          git push

      - name: Summary
        if: always()
        run: |
          echo "### 📋 Appearance Anxiety Daily Report" >> "$GITHUB_STEP_SUMMARY"
          echo "**Date:** ${{ steps.date.outputs.target }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Papers analyzed:** ${{ steps.papers.outputs.count || 'N/A' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Report:** [appearance-anxiety-${{ steps.date.outputs.target }}.html](https://u8901006.github.io/appearance-anxiety/appearance-anxiety-${{ steps.date.outputs.target }}.html)" >> "$GITHUB_STEP_SUMMARY"
